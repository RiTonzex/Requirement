{% extends 'base.html' %}

{% block title %}เข้าสู่ระบบ - Local Worker Directory{% endblock %}

{% block content %}
<div class="container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="custom-card shadow">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-primary display-4 mb-2 d-block"></i>
                    <h2 class="h3 text-white fw-bold">เข้าสู่ระบบ</h2>
                    <p class="text-muted">ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>
                </div>

                <form action="{{ url_for('login') }}" method="POST">
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="bi bi-person-fill text-muted me-1"></i> ชื่อผู้ใช้ (Username)</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="ระบุชื่อผู้ใช้ของคุณ" required autofocus>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="bi bi-key-fill text-muted me-1"></i> รหัสผ่าน (Password)</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="ระบุรหัสผ่าน" required>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary w-100 py-2.5 mt-3">
                        <i class="bi bi-box-arrow-in-right me-1"></i> เข้าสู่ระบบ
                    </button>
                </form>

                <div class="border-top border-secondary mt-4 pt-3 text-center">
                    <p class="text-muted mb-0 small">ยังไม่ได้เป็นสมาชิกใช่หรือไม่? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">สมัครสมาชิกที่นี่</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
